name: Sync Notion to Portfolio

on:
  schedule:
    # Chạy tự động mỗi 15 phút. 
    # (Tần suất này dùng khoảng 2.800 phút/tháng, rất an toàn trong ngưỡng 2.000 - 3.000 phút miễn phí của GitHub)
    - cron: '*/15 * * * *'
  
  # Cho phép bạn vào thẳng GitHub bấm nút chạy thủ công bất cứ lúc nào nếu cần update gấp
  workflow_dispatch: 

jobs:
  revalidate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Next.js Revalidation
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: |
          if [ -z "$PRODUCTION_URL" ] || [ -z "$REVALIDATE_SECRET" ]; then
            echo "Error: Missing PRODUCTION_URL or REVALIDATE_SECRET in GitHub Secrets"
            exit 1
          fi
          echo "Triggering cache revalidation..."
          curl -X POST "$PRODUCTION_URL/api/revalidate?secret=$REVALIDATE_SECRET" \
          -H "Content-Type: application/json" \
          -w "\nHTTP Status: %{http_code}\n"