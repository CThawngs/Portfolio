name: Portfolio AI Translator Bot

on:
  repository_dispatch:
    types: [trigger-translation-bot]
  workflow_dispatch: 
    # Cho phép bạn bấm nút chạy bằng tay trên GitHub nếu muốn test ngay lập tức

concurrency:
  group: translation-bot-group
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn (Checkout repo)
        uses: actions/checkout@v3

      - name: Cài đặt môi trường Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cài đặt thư viện (Dependencies)
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Đánh thức AI Agent (Run script)
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_PROFILE_DATABASE_ID: ${{ secrets.NOTION_PROFILE_DATABASE_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python main.py
